extent.reporter.spark.start=true
extent.reporter.spark.out=test-output/SparkReport/Spark.html

# Screenshots config
extent.reporter.spark.config.documentTitle=Appium Test Automation Report
extent.reporter.spark.config.reportName=Appium Test Automation Report
extent.reporter.spark.config.theme=standard

# Attach screenshots for failed steps
extent.reporter.spark.basefolder.name=test-output
extent.reporter.spark.basefolder.datetimepattern=d-MMM-YY HH-mm-ss
screenshot.dir=Screenshots/
screenshot.rel.path=../Screenshots/

